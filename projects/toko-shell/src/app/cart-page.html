<div class="max-w-4xl mx-auto p-6">
  <h2 class="text-2xl font-bold text-gray-800 mb-6">Keranjang Belanja</h2>

  <div *ngIf="cartItems.length === 0" class="text-center py-12 bg-white rounded-xl shadow-sm border border-gray-100">
    <p class="text-gray-500 text-lg">Wah, keranjang belanjamu kosong.</p>
    <button routerLink="/" class="mt-4 bg-green-500 hover:bg-green-600 text-white font-semibold px-6 py-2 rounded-lg transition-colors">
      Mulai Belanja
    </button>
  </div>

  <div *ngIf="cartItems.length > 0" class="grid grid-cols-1 md:grid-cols-3 gap-6">
    
    <div class="md:col-span-2 space-y-4">
      <div *ngFor="let item of cartItems" class="flex items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100">
        <img [src]="item.product.image" [alt]="item.product.name" class="w-20 h-20 object-cover rounded-lg">
        <div class="ml-4 flex-grow">
          <h4 class="font-bold text-gray-900">{{ item.product.name }}</h4>
          <p class="text-green-600 font-semibold text-sm mt-1">Rp {{ item.product.price | number:'1.0-0' }}</p>
          <p class="text-xs text-gray-400 mt-1">Jumlah: {{ item.quantity }}x</p>
        </div>
        <div class="text-right font-bold text-gray-800">
          Rp {{ (item.product.price * item.quantity) | number:'1.0-0' }}
        </div>
      </div>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 h-fit">
      <h3 class="font-bold text-lg text-gray-900 border-b border-gray-100 pb-3">Ringkasan Belanja</h3>
      <div class="flex justify-between items-center my-4">
        <span class="text-gray-600">Total Harga</span>
        <span class="font-bold text-xl text-green-600">Rp {{ totalPrice | number:'1.0-0' }}</span>
      </div>
      <button 
        (click)="onCheckout()" 
        class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl transition-colors shadow-sm">
        Beli (Checkout)
      </button>
    </div>

  </div>
</div>
