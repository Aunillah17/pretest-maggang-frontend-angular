<div class="min-h-screen bg-gray-50 flex flex-col font-sans">
  <header class="bg-white shadow-sm sticky top-0 z-50 border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      
      <div class="flex items-center space-x-2 cursor-pointer" routerLink="/">
        <span class="text-2xl font-extrabold text-green-500 tracking-tight">Toko</span>
        <span class="text-2xl font-extrabold text-gray-800 bg-green-100 px-2 py-0.5 rounded-lg tracking-tight">Monorepo</span>
      </div>

      <div class="flex items-center space-x-6">
        <a routerLink="/" class="text-gray-600 hover:text-green-500 font-medium transition-colors">Katalog</a>
        
        <a routerLink="/cart" class="relative p-2 text-gray-600 hover:text-green-500 transition-colors cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 0a2 2 0 100 4 2 2 0 000-4z" />
          </svg>
          
          <span *ngIf="cartCount > 0" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center animate-pulse">
            {{ cartCount }}
          </span>
        </a>
      </div>

    </div>
  </header>

  <main class="flex-grow">
    <router-outlet></router-outlet>
  </main>

  <footer class="bg-white border-t border-gray-100 py-4 text-center text-sm text-gray-500">
    &copy; 2026 Toko Monorepo - Pretest PKL Backend & Frontend Engineer
  </footer>
</div>
