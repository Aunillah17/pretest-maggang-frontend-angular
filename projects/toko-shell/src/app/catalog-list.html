<div class="max-w-6xl mx-auto p-6 bg-white">
  <h1 class="text-3xl font-extrabold text-gray-800 mb-8">Katalog Produk Pilihan</h1>
  
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
    <div *ngFor="let product of products" class="bg-white p-5 rounded-2xl shadow-md border border-gray-100 hover:scale-105 transition-transform duration-300">
      <img [src]="product.image" alt="Product" class="w-full h-48 object-cover rounded-lg mb-4">
      <h2 class="text-lg font-bold text-gray-900">{{ product.name }}</h2>
<p class="text-sm text-gray-500 mb-2">{{ product.description }}</p> <p class="text-teal-600 font-semibold mt-1">Rp {{ product.price.toLocaleString() }}</p>
      <button (click)="onAddToCart(product)" class="mt-4 w-full bg-teal-600 hover:bg-teal-700 text-white font-medium py-2 rounded-lg transition">
        Tambah ke Keranjang
      </button>
    </div>
  </div>
</div>
